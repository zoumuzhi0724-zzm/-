<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>区块链溯源系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            max-width: 1200px;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .card-header {
            background-color: #007bff;
            color: white;
            border-radius: 10px 10px 0 0;
        }
        .form-control {
            border-radius: 5px;
        }
        .btn-primary {
            border-radius: 5px;
        }
        .btn-success {
            border-radius: 5px;
        }
        .btn-info {
            border-radius: 5px;
        }
        .table {
            border-radius: 5px;
            overflow: hidden;
        }
        .table th {
            background-color: #007bff;
            color: white;
        }
        .trace-result {
            margin-top: 20px;
            padding: 20px;
            background-color: #e3f2fd;
            border-radius: 10px;
        }
        .block-data {
            margin-top: 10px;
            padding: 10px;
            background-color: #f1f1f1;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-5">区块链溯源系统</h1>
        
        <div class="row">
            <!-- 添加产品 -->
            <div class="col-md-6 mb-5">
                <div class="card">
                    <div class="card-header">
                        <h3>添加产品</h3>
                    </div>
                    <div class="card-body">
                        <form id="addProductForm">
                            <div class="mb-3">
                                <label for="productId" class="form-label">产品ID</label>
                                <input type="text" class="form-control" id="productId" placeholder="输入产品ID">
                            </div>
                            <div class="mb-3">
                                <label for="productName" class="form-label">产品名称</label>
                                <input type="text" class="form-control" id="productName" placeholder="输入产品名称">
                            </div>
                            <div class="mb-3">
                                <label for="manufacturer" class="form-label">制造商</label>
                                <input type="text" class="form-control" id="manufacturer" placeholder="输入制造商">
                            </div>
                            <div class="mb-3">
                                <label for="productionDate" class="form-label">生产日期</label>
                                <input type="date" class="form-control" id="productionDate">
                            </div>
                            <button type="submit" class="btn btn-primary">添加产品</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <!-- 更新产品状态 -->
            <div class="col-md-6 mb-5">
                <div class="card">
                    <div class="card-header">
                        <h3>更新产品状态</h3>
                    </div>
                    <div class="card-body">
                        <form id="updateStatusForm">
                            <div class="mb-3">
                                <label for="updateProductId" class="form-label">产品ID</label>
                                <input type="text" class="form-control" id="updateProductId" placeholder="输入产品ID">
                            </div>
                            <div class="mb-3">
                                <label for="newStatus" class="form-label">新状态</label>
                                <select class="form-control" id="newStatus">
                                    <option value="生产完成">生产完成</option>
                                    <option value="运输中">运输中</option>
                                    <option value="已入库">已入库</option>
                                    <option value="已销售">已销售</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-success">更新状态</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 溯源查询 -->
        <div class="row mb-5">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h3>产品溯源查询</h3>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <form id="traceForm">
                                    <div class="mb-3">
                                        <label for="traceProductId" class="form-label">产品ID</label>
                                        <input type="text" class="form-control" id="traceProductId" placeholder="输入产品ID">
                                    </div>
                                    <button type="submit" class="btn btn-info">查询溯源</button>
                                </form>
                            </div>
                        </div>
                        
                        <!-- 溯源结果 -->
                        <div id="traceResult" class="trace-result" style="display: none;">
                            <h4>产品信息</h4>
                            <div id="productInfo"></div>
                            <h4 class="mt-4">区块链记录</h4>
                            <div id="blockchainData"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 区块链信息 -->
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h3>区块链信息</h3>
                    </div>
                    <div class="card-body">
                        <button id="showChainBtn" class="btn btn-primary mb-3">显示区块链</button>
                        <div id="chainData" style="display: none;">
                            <table class="table table-bordered">
                                <thead>
                                    <tr>
                                        <th>区块高度</th>
                                        <th>时间戳</th>
                                        <th>数据</th>
                                        <th>哈希值</th>
                                        <th>前一区块哈希</th>
                                    </tr>
                                </thead>
                                <tbody id="chainTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 添加产品
        document.getElementById('addProductForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const productId = document.getElementById('productId').value;
            const productName = document.getElementById('productName').value;
            const manufacturer = document.getElementById('manufacturer').value;
            const productionDate = document.getElementById('productionDate').value;
            
            try {
                const response = await fetch('/api/add_product', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        product_id: productId,
                        product_name: productName,
                        manufacturer: manufacturer,
                        production_date: productionDate
                    })
                });
                
                const result = await response.json();
                alert(result.message);
                // 重置表单
                this.reset();
            } catch (error) {
                console.error('Error:', error);
                alert('添加产品失败');
            }
        });
        
        // 更新产品状态
        document.getElementById('updateStatusForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const productId = document.getElementById('updateProductId').value;
            const newStatus = document.getElementById('newStatus').value;
            
            try {
                const response = await fetch('/api/update_status', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        product_id: productId,
                        status: newStatus
                    })
                });
                
                const result = await response.json();
                alert(result.message);
                // 重置表单
                this.reset();
            } catch (error) {
                console.error('Error:', error);
                alert('更新状态失败');
            }
        });
        
        // 溯源查询
        document.getElementById('traceForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const productId = document.getElementById('traceProductId').value;
            
            try {
                const response = await fetch(`/api/trace/${productId}`, {
                    method: 'GET'
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    alert(error.error);
                    return;
                }
                
                const result = await response.json();
                
                // 显示产品信息
                const productInfoDiv = document.getElementById('productInfo');
                productInfoDiv.innerHTML = `
                    <p><strong>产品ID:</strong> ${result.product_info.product_id}</p>
                    <p><strong>产品名称:</strong> ${result.product_info.product_name}</p>
                    <p><strong>制造商:</strong> ${result.product_info.manufacturer}</p>
                    <p><strong>生产日期:</strong> ${result.product_info.production_date}</p>
                    <p><strong>当前状态:</strong> ${result.product_info.status}</p>
                    <p><strong>最后更新时间:</strong> ${new Date(result.product_info.timestamp * 1000).toLocaleString()}</p>
                `;
                
                // 显示区块链数据
                const blockchainDataDiv = document.getElementById('blockchainData');
                blockchainDataDiv.innerHTML = '';
                
                result.blockchain_data.forEach(block => {
                    const blockDiv = document.createElement('div');
                    blockDiv.className = 'block-data';
                    blockDiv.innerHTML = `
                        <h5>区块 ${block.index}</h5>
                        <p><strong>时间戳:</strong> ${new Date(block.timestamp * 1000).toLocaleString()}</p>
                        <p><strong>数据:</strong> ${JSON.stringify(block.data)}</p>
                        <p><strong>哈希值:</strong> ${block.hash}</p>
                        <p><strong>前一区块哈希:</strong> ${block.previous_hash}</p>
                    `;
                    blockchainDataDiv.appendChild(blockDiv);
                });
                
                // 显示结果
                document.getElementById('traceResult').style.display = 'block';
            } catch (error) {
                console.error('Error:', error);
                alert('查询失败');
            }
        });
        
        // 显示区块链
        document.getElementById('showChainBtn').addEventListener('click', async function() {
            try {
                const response = await fetch('/api/chain', {
                    method: 'GET'
                });
                
                const result = await response.json();
                
                // 显示区块链数据
                const chainTableBody = document.getElementById('chainTableBody');
                chainTableBody.innerHTML = '';
                
                result.chain.forEach(block => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${block.index}</td>
                        <td>${new Date(block.timestamp * 1000).toLocaleString()}</td>
                        <td>${JSON.stringify(block.data)}</td>
                        <td>${block.hash}</td>
                        <td>${block.previous_hash}</td>
                    `;
                    chainTableBody.appendChild(row);
                });
                
                // 显示区块链
                document.getElementById('chainData').style.display = 'block';
            } catch (error) {
                console.error('Error:', error);
                alert('获取区块链数据失败');
            }
        });
    </script>
</body>
</html>
